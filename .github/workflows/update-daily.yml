name: Daily Update - Tab 1 (Account KPI)

on:
  schedule:
    # Every day at 01:00 UTC
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write
  repository-projects: read

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Set Yandex API token
        env:
          YANDEX_TOKEN: ${{ secrets.YANDEX_API_TOKEN }}
        run: |
          echo "YANDEX_TOKEN=$YANDEX_TOKEN" >> $GITHUB_ENV
      
      - name: Extract daily data (Tab 1)
        run: |
          echo "🔍 DEBUG: Current date and time"
          python3 -c "from datetime import datetime, timedelta; dt = datetime.now().date(); print(f'Today: {dt}'); print(f'30 days ago: {dt - timedelta(days=30)}')"
          echo ""
          python extraction/extract_correct.py stage1
      
      - name: Update results via GitHub API
        run: |
          python3 << 'PYTHON'
          import json
          import base64
          import requests
          import os
          from datetime import datetime
          
          TOKEN = os.environ['GITHUB_TOKEN']
          OWNER = 'imjusttryingguyes'
          REPO = 'ai-optimizer'
          
          # Read the file to update
          with open('results/account_kpi.json', 'r') as f:
              content = f.read()
          
          # Encode to base64
          content_b64 = base64.b64encode(content.encode()).decode()
          
          # Get current file SHA (needed for update)
          url = f'https://api.github.com/repos/{OWNER}/{REPO}/contents/results/account_kpi.json'
          headers = {'Authorization': f'token {TOKEN}', 'Accept': 'application/vnd.github.v3+json'}
          
          r = requests.get(url, headers=headers)
          if r.status_code != 200:
              print(f"Error getting file: {r.text}")
              exit(1)
          
          current_sha = r.json()['sha']
          
          # Update file via API
          commit_msg = f"🔄 Auto-update: Daily KPI data (Tab 1) - {datetime.utcnow().strftime('%Y-%m-%d %H:%M UTC')}"
          
          payload = {
              'message': commit_msg,
              'content': content_b64,
              'sha': current_sha,
              'branch': 'main',
              'committer': {
                  'name': 'github-actions[bot]',
                  'email': 'github-actions[bot]@users.noreply.github.com'
              }
          }
          
          r = requests.put(url, json=payload, headers=headers)
          
          if r.status_code == 200:
              print("✅ File updated successfully via GitHub API")
          else:
              print(f"❌ Error updating file: {r.text}")
              exit(1)
          PYTHON
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Trigger HF Space sync
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.HF_API_TOKEN }}" \
            https://huggingface.co/api/spaces/SamShal1/phase4-analytics/runtime/restart
