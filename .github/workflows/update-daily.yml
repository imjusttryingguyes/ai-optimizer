name: Daily Update - Tab 1 (Account KPI)

on:
  schedule:
    # Every day at 01:00 UTC
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Set Yandex API token
        env:
          YANDEX_TOKEN: ${{ secrets.YANDEX_API_TOKEN }}
        run: |
          echo "YANDEX_TOKEN=$YANDEX_TOKEN" >> $GITHUB_ENV
      
      - name: Extract daily data (Tab 1)
        run: |
          python extraction/extract_correct.py stage1
      
      - name: Commit and push results
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add results/account_kpi.json
          git diff --cached --quiet || git commit -m "🔄 Auto-update: Daily KPI data (Tab 1) - $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
      
      - name: Trigger HF Space sync
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.HF_API_TOKEN }}" \
            https://huggingface.co/api/spaces/SamShal1/phase4-analytics/runtime/restart
