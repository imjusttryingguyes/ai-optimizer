name: Weekly Update - Tabs 2 & 3 (Segments & Campaigns)

on:
  schedule:
    # Every Monday at 01:00 UTC (Sunday 23:00 → Monday 01:00)
    - cron: '0 1 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  repository-projects: read

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Set Yandex API token
        env:
          YANDEX_TOKEN: ${{ secrets.YANDEX_API_TOKEN }}
        run: |
          echo "YANDEX_TOKEN=$YANDEX_TOKEN" >> $GITHUB_ENV
      
      - name: Extract all data (Stages 1-3)
        run: |
          python extraction/extract_correct.py all
      
      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          git diff --cached --quiet || git commit -m "📊 Auto-update: Full data extraction (Tabs 1-3) - $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Trigger HF Space sync
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.HF_API_TOKEN }}" \
            https://huggingface.co/api/spaces/SamShal1/phase4-analytics/runtime/restart
