name: Weekly Update - Tabs 2 & 3 (Segments & Campaigns)

on:
  schedule:
    # Every Monday at 01:00 UTC (Sunday 23:00 → Monday 01:00)
    - cron: '0 1 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  repository-projects: read

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Set Yandex API token
        env:
          YANDEX_TOKEN: ${{ secrets.YANDEX_API_TOKEN }}
        run: |
          echo "YANDEX_TOKEN=$YANDEX_TOKEN" >> $GITHUB_ENV
      
      - name: Extract all data (Stages 1-3)
        run: |
          python extraction/extract_correct.py all
      
      - name: Update results via GitHub API
        run: |
          python3 << 'PYTHON'
          import json
          import base64
          import requests
          import os
          from datetime import datetime
          
          TOKEN = os.environ['GITHUB_TOKEN']
          OWNER = 'imjusttryingguyes'
          REPO = 'ai-optimizer'
          FILES = ['results/account_kpi.json', 'results/insights.json', 'results/campaigns.json']
          
          for file_path in FILES:
              # Read the file
              with open(file_path, 'r') as f:
                  content = f.read()
              
              # Encode to base64
              content_b64 = base64.b64encode(content.encode()).decode()
              
              # Get current file SHA
              url = f'https://api.github.com/repos/{OWNER}/{REPO}/contents/{file_path}'
              headers = {'Authorization': f'token {TOKEN}', 'Accept': 'application/vnd.github.v3+json'}
              
              r = requests.get(url, headers=headers)
              if r.status_code != 200:
                  print(f"Error getting {file_path}: {r.text}")
                  continue
              
              current_sha = r.json()['sha']
              
              # Update file via API
              commit_msg = f"📊 Auto-update: Full data extraction (Tabs 1-3) - {datetime.utcnow().strftime('%Y-%m-%d %H:%M UTC')}"
              
              payload = {
                  'message': commit_msg,
                  'content': content_b64,
                  'sha': current_sha,
                  'branch': 'main',
                  'committer': {
                      'name': 'github-actions[bot]',
                      'email': 'github-actions[bot]@users.noreply.github.com'
                  }
              }
              
              r = requests.put(url, json=payload, headers=headers)
              
              if r.status_code == 200:
                  print(f"✅ {file_path} updated via GitHub API")
              else:
                  print(f"❌ Error updating {file_path}: {r.text}")
          
          print("\n   HF Space will auto-sync when it detects the changes")
          PYTHON
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
