<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>{% block title %}AI Optimizer Dashboard{% endblock %}</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
	<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
	<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
	<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
		<div class="container-fluid">
			<a class="navbar-brand" href="/">
				<i class="bi bi-graph-up"></i> AI Optimizer
			</a>
			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="navbarNav">
				<ul class="navbar-nav ms-auto">
					<li class="nav-item">
						<a class="nav-link" href="/">Дашборд</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" href="/insights">Инсайты</a>
					</li>
				</ul>
			</div>
		</div>
	</nav>

	<main class="container-fluid py-4">
		{% block content %}{% endblock %}
	</main>

	<footer class="bg-dark text-white mt-5 py-4 text-center">
		<p class="mb-0">AI Optimizer • Система автоматической оптимизации рекламных кампаний</p>
	</footer>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
	<script src="{{ url_for('static', filename='charts.js') }}"></script>
	{% block scripts %}{% endblock %}
</body>
</html>
